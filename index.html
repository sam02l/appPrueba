<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node - Acceso</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #f8f9fa; --text: #2b2d42; --card: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .app-content { display: none; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { border: none; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; background: var(--card); }
        .btn-main { background: var(--primary); color: white; border-radius: 12px; padding: 12px; font-weight: 600; border: none; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: #3046bc; transform: translateY(-2px); }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e9ecef; background: #fdfeff; }
        .log-container { max-height: 250px; overflow-y: auto; font-size: 0.85rem; padding-right: 5px; }
        .log-entry { border-left: 3px solid var(--primary); background: #fcfdfe; padding: 10px; margin-bottom: 8px; border-radius: 0 12px 12px 0; }
        .user-badge { background: #eef2ff; color: var(--primary); padding: 20px; border-radius: 16px; text-align: center; }
        .pin-display { font-size: 2rem; font-weight: 700; letter-spacing: 5px; color: var(--primary); }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="auth-card">
            <h4 class="text-center fw-bold mb-4">Bienvenido</h4>
            <div class="mb-3">
                <label class="form-label small fw-bold">Usuario / Nombre</label>
                <input type="text" id="login-user" class="form-control" placeholder="Tu nombre">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">PIN de Seguridad</label>
                <input type="password" id="login-pin" class="form-control" placeholder="****" maxlength="4">
            </div>
            <button onclick="intentarLogin()" class="btn-main">Entrar al Sistema</button>
            <div id="login-error" class="text-danger small text-center mt-3" style="display:none;">Credenciales incorrectas</div>
        </div>
    </div>

    <!-- VISTA ADMINISTRADOR -->
    <div id="admin-view" class="app-content container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0">Panel de Control</h5>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger px-3 rounded-pill">Salir</button>
        </div>
        
        <div class="card p-3 mb-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold m-0 small">📡 ACTIVIDAD</h6>
                <button onclick="limpiarHistorial()" class="btn btn-link btn-sm text-decoration-none text-muted" style="font-size: 0.7rem;">BORRAR LOGS</button>
            </div>
            <div id="log-list" class="log-container">
                <p class="text-center text-muted py-3">Sincronizando actividad...</p>
            </div>
        </div>

        <div class="card p-3 mb-3">
            <h6 class="fw-bold mb-3 small text-uppercase">👤 Registro de Usuario</h6>
            <div class="row g-2">
                <div class="col-6"><input type="text" id="uid" class="form-control form-control-sm" placeholder="UID Tarjeta"></div>
                <div class="col-6"><input type="text" id="nombre" class="form-control form-control-sm" placeholder="Nombre"></div>
                <div class="col-12"><input type="password" id="pin" class="form-control form-control-sm" placeholder="PIN (4 dígitos)" maxlength="4"></div>
                <div class="col-12"><button onclick="crearUsuario()" class="btn btn-primary btn-sm w-100 rounded-3 py-2">Sincronizar Acceso</button></div>
            </div>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold mb-3 small text-uppercase">👥 Personal Autorizado</h6>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" style="font-size: 0.85rem;">
                    <tbody id="tabla-usuarios-body"></tbody>
                </table>
            </div>
        </div>

        <div class="row g-2 mt-2">
            <div class="col-6"><button onclick="enviarComando('emergencia')" class="btn btn-danger w-100 py-3 rounded-4 fw-bold">BLOQUEO TOTAL</button></div>
            <div class="col-6"><button onclick="enviarComando('reset')" class="btn btn-light border w-100 py-3 rounded-4">RESET</button></div>
        </div>
    </div>

    <!-- VISTA USUARIO -->
    <div id="user-view" class="app-content container text-center">
        <div class="auth-card mx-auto mt-5">
            <div class="user-badge mb-4">
                <h2 id="perfil-nombre" class="m-0">Hola</h2>
                <span class="small opacity-75">Residente Autorizado</span>
            </div>
            <p class="text-muted small mb-1">Tu ID de Acceso:</p>
            <h5 id="perfil-uid" class="fw-bold mb-4">---</h5>
            <p class="text-muted small mb-1">Tu PIN de entrada:</p>
            <div id="perfil-pin" class="pin-display">****</div>
            <button onclick="logout()" class="btn btn-light w-100 mt-5 rounded-4 border">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
