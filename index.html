<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security IoT Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0c10; --card: #161b22; --accent: #58a6ff; --danger: #ff7b72; --success: #3fb950; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Inter', sans-serif; }
        h3 { font-family: 'Orbitron', sans-serif; color: var(--accent); letter-spacing: 2px; }
        
        .glass-card { 
            background: rgba(22, 27, 34, 0.8); 
            backdrop-filter: blur(10px);
            border: 1px solid #30363d; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .log-container { 
            max-height: 250px; overflow-y: auto; background: #010409; 
            border-radius: 12px; padding: 15px; border: 1px solid #30363d;
        }

        .log-entry { 
            border-left: 4px solid var(--success); background: #1c2128;
            padding: 10px; margin-bottom: 10px; border-radius: 4px 12px 12px 4px;
            font-size: 0.85rem; transition: 0.3s;
        }

        .btn-action { font-weight: 600; border-radius: 8px; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; }
        .btn-panic { background: var(--danger); color: white; border: none; box-shadow: 0 0 15px rgba(255, 123, 114, 0.3); }
        .btn-panic:hover { background: #f85149; transform: scale(1.02); }
        
        .form-control { 
            background: #0d1117; border: 1px solid #30363d; color: white; 
            padding: 12px; border-radius: 10px;
        }
        .form-control:focus { background: #0d1117; color: white; border-color: var(--accent); box-shadow: none; }
        
        .status-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; background: rgba(88, 166, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="text-center mb-4">
        <h3>SECURE-IT <span class="status-badge">ONLINE</span></h3>
        <p class="text-muted small">Terminal de Gestión de Accesos</p>
    </header>

    <!-- HISTORIAL -->
    <div class="glass-card p-3 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="fw-bold">📡 Actividad Reciente</span>
            <button onclick="limpiarHistorial()" class="btn btn-sm btn-outline-secondary" style="font-size: 0.7rem;">BORRAR LOGS</button>
        </div>
        <div id="log-list" class="log-container">
            <div class="text-center text-muted py-4 small">Sincronizando con satélite...</div>
        </div>
    </div>

    <!-- USUARIOS REGISTRADOS -->
    <div class="glass-card p-3 mb-4">
        <span class="fw-bold d-block mb-3">👥 Personal Autorizado</span>
        <div class="table-responsive">
            <table class="table table-dark table-borderless align-middle mb-0" style="font-size: 0.85rem;">
                <tbody id="tabla-usuarios-body">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- REGISTRO -->
    <div class="glass-card p-4 mb-4">
        <span class="fw-bold d-block mb-3">📝 Nuevo Registro / Edición</span>
        <div class="row g-3">
            <div class="col-12">
                <input type="text" id="uid" class="form-control" placeholder="UID de Tarjeta">
            </div>
            <div class="col-12">
                <input type="text" id="nombre" class="form-control" placeholder="Nombre de Usuario">
            </div>
            <div class="col-12">
                <input type="password" id="pin" class="form-control" placeholder="PIN de 4 dígitos" maxlength="4">
            </div>
            <div class="col-12">
                <button onclick="crearUsuario()" class="btn btn-primary w-100 btn-action py-3">Actualizar Base de Datos</button>
            </div>
        </div>
    </div>

    <!-- CONTROLES CRÍTICOS -->
    <div class="row g-3">
        <div class="col-6">
            <button onclick="enviarComando('emergencia')" class="btn btn-panic w-100 py-3 btn-action">Bloqueo Total</button>
        </div>
        <div class="col-6">
            <button onclick="enviarComando('reset')" class="btn btn-outline-secondary w-100 py-3 btn-action">Sistema Reset</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
