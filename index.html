<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Control Pro</title>
    <link rel="manifest" href="manifest.json">
    <!-- Bootstrap para diseño y Google Fonts para una fuente más limpia -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Roboto', sans-serif; 
        }
        .container { max-width: 500px; }
        
        /* Estilo de Tarjetas */
        .card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card-title { color: #58a6ff; font-weight: bold; font-size: 1.1rem; }

        /* Estilo de las Barras de Entrada */
        .form-label { font-size: 0.85rem; color: #8b949e; margin-bottom: 4px; margin-left: 2px; }
        .form-control { 
            background-color: #0d1117; 
            border: 1px solid #30363d; 
            color: white; 
            border-radius: 8px;
            padding: 10px;
        }
        .form-control:focus { 
            background-color: #0d1117; 
            border-color: #58a6ff; 
            color: white; 
            box-shadow: 0 0 0 2px rgba(88,166,255,0.3); 
        }

        /* Historial */
        .log-container { 
            max-height: 300px; 
            overflow-y: auto; 
            background: #010409; 
            border-radius: 8px; 
            padding: 10px;
            border: 1px solid #30363d;
        }
        .log-entry { 
            border-left: 3px solid #238636; 
            background: #161b22;
            padding: 8px 12px; 
            margin-bottom: 8px; 
            border-radius: 0 6px 6px 0;
            font-size: 0.85rem;
        }
        .timestamp { color: #8b949e; font-size: 0.75rem; font-weight: bold; }

        /* Botones */
        .btn-primary { background-color: #238636; border: none; font-weight: bold; }
        .btn-primary:hover { background-color: #2ea043; }
        .btn-panic { background-color: #da3633; color: white; border: none; font-weight: bold; }
        .btn-panic:hover { background-color: #f85149; }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="text-center mb-4">
        <h3 class="fw-bold">🛡️ Security Dashboard</h3>
        <p class="text-muted small">Panel de Control IoT - Acceso Remoto</p>
    </header>

    <!-- MONITOR DE EVENTOS -->
    <div class="card p-3 mb-4">
        <div class="card-title mb-2">📋 Historial Reciente</div>
        <div id="log-list" class="log-container">
            <div class="text-center text-muted py-4">Esperando datos de la nube...</div>
        </div>
    </div>

    <!-- REGISTRO DE USUARIOS -->
    <div class="card p-4 mb-4">
        <div class="card-title mb-3">👤 Registrar Nuevo Acceso</div>
        
        <div class="mb-3">
            <label for="uid" class="form-label">ID de Tarjeta (UID)</label>
            <input type="text" id="uid" class="form-control" placeholder="Ej: 334FFE0F" autocomplete="off">
            <div class="form-text" style="font-size: 0.7rem;">Cópialo del monitor serial si es una tarjeta nueva.</div>
        </div>

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del Propietario</label>
            <input type="text" id="nombre" class="form-control" placeholder="Ej: Samuel">
        </div>

        <div class="mb-4">
            <label for="pin" class="form-label">Código PIN de Seguridad</label>
            <input type="password" id="pin" class="form-control" placeholder="4 dígitos numéricos" maxlength="4" inputmode="numeric">
        </div>

        <button onclick="crearUsuario()" class="btn btn-primary w-100 py-2">
            🚀 Vincular con Cerradura
        </button>
    </div>

    <!-- ACCIONES RÁPIDAS -->
    <div class="row g-2">
        <div class="col-6">
            <button onclick="enviarComando('emergencia')" class="btn btn-panic w-100 py-3">
                🚨 PÁNICO
            </button>
        </div>
        <div class="col-6">
            <button onclick="enviarComando('reset')" class="btn btn-secondary w-100 py-3">
                🔄 REINICIAR
            </button>
        </div>
    </div>
    
    <footer class="mt-5 text-center text-muted" style="font-size: 0.7rem;">
        Sistema Conectado a Firebase Realtime Database
    </footer>
</div>

<!-- Firebase y Lógica -->
<script type="module" src="app.js"></script>

</body>
</html>
