<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security IoT</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: sans-serif; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; }
        .log-container { max-height: 400px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; }
        .log-entry { border-left: 3px solid #00d4ff; padding: 5px 10px; margin-bottom: 8px; font-size: 0.9rem; }
        .timestamp { color: #00d4ff; font-weight: bold; }
        .btn-panic { background: #ff4b2b; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h3 class="text-center mb-4">🛡️ Panel de Seguridad</h3>

        <!-- Monitor de Historial -->
        <div class="card p-3 mb-4">
            <h6 class="text-info">Historial de Eventos</h6>
            <div id="log-list" class="log-container">
                <p class="text-muted text-center">Cargando eventos...</p>
            </div>
        </div>

        <!-- Gestión de Usuarios -->
        <div class="card p-3 mb-4">
            <h6 class="text-warning">Registrar Nuevo Acceso</h6>
            <input type="text" id="uid" class="form-control bg-dark text-white border-secondary mb-2" placeholder="UID (Ej: 334FFE0F)">
            <input type="text" id="nombre" class="form-control bg-dark text-white border-secondary mb-2" placeholder="Nombre de Usuario">
            <input type="number" id="pin" class="form-control bg-dark text-white border-secondary mb-2" placeholder="PIN de 4 dígitos">
            <button onclick="crearUsuario()" class="btn btn-primary w-100">Guardar en Firebase</button>
        </div>

        <!-- Controles Remotos -->
        <div class="row g-2">
            <div class="col-6"><button onclick="comando('emergencia')" class="btn btn-panic w-100 py-3">PÁNICO</button></div>
            <div class="col-6"><button onclick="comando('reset')" class="btn btn-secondary w-100 py-3">RESET</button></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
