<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Seguridad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <header>
    <h1>🔐 Sistema de Seguridad</h1>
  </header>

  <main>

    <section class="card">
      <h2>Eventos</h2>
      <ul id="eventos"></ul>
    </section>

    <section class="card">
      <h2>Cambiar PIN</h2>
      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="nuevoPin" placeholder="Nuevo PIN">
      <button onclick="cambiarPIN()">Actualizar</button>
    </section>

  </main>

  <script src="firebase.js" type="module"></script>
  <script src="app.js" type="module"></script>

</body>
</html>
