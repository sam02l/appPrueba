<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #f8f9fa; --text: #2b2d42; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        .app-content { display: none; padding: 20px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { border: none; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .btn-main { background: var(--primary); color: white; border-radius: 12px; padding: 12px; font-weight: 600; border: none; width: 100%; }
        .form-control { border-radius: 10px; border: 1px solid #e9ecef; margin-bottom: 10px; font-size: 0.9rem; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .log-entry { border-left: 3px solid var(--primary); background: #ffffff; padding: 10px; margin-bottom: 8px; border-radius: 0 12px 12px 0; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .pin-box { font-size: 1.8rem; font-weight: 700; color: var(--primary); letter-spacing: 4px; }
    </style>
</head>
<body>

    <!-- PANTALLA LOGIN -->
    <div id="login-screen">
        <div class="auth-card">
            <h4 class="text-center fw-bold mb-4">Sentry Node</h4>
            <input type="text" id="login-user" class="form-control" placeholder="Usuario">
            <input type="password" id="login-pass" class="form-control" placeholder="Contraseña">
            <button onclick="intentarLogin()" class="btn-main mt-2">Ingresar</button>
            <p id="login-error" class="text-danger small text-center mt-3" style="display:none;">Acceso denegado</p>
        </div>
    </div>

    <!-- PANEL ADMIN -->
    <div id="admin-view" class="app-content container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0">Administración</h5>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger px-3 rounded-pill">Salir</button>
        </div>

        <div class="row">
            <!-- Formulario de Registro -->
            <div class="col-md-5">
                <div class="card p-3">
                    <h6 class="fw-bold mb-3 small text-primary">NUEVO REGISTRO</h6>
                    <label class="small fw-bold">Datos Físicos (Hardware)</label>
                    <input type="text" id="uid" class="form-control" placeholder="UID Tarjeta (Ej: 334FFE0F)">
                    <input type="text" id="nombre" class="form-control" placeholder="Nombre Real">
                    <input type="text" id="pin_fisico" class="form-control" placeholder="PIN Teclado (4 dígitos)">
                    
                    <label class="small fw-bold mt-2">Acceso Web (PWA)</label>
                    <input type="text" id="user_web" class="form-control" placeholder="Usuario para App">
                    <input type="text" id="pass_web" class="form-control" placeholder="Contraseña para App">
                    
                    <button onclick="crearUsuario()" class="btn btn-primary w-100 rounded-3 mt-2">Guardar Usuario</button>
                </div>
            </div>

            <!-- Historial -->
            <div class="col-md-7">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold m-0 small">HISTORIAL DE EVENTOS</h6>
                        <button onclick="limpiarHistorial()" class="btn btn-link btn-sm text-danger text-decoration-none p-0" style="font-size:0.7rem">Limpiar</button>
                    </div>
                    <div id="log-list" style="max-height: 250px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>

        <!-- Tabla de Usuarios -->
        <div class="card p-3 mt-3">
            <h6 class="fw-bold mb-3 small">USUARIOS EN SISTEMA</h6>
            <div class="table-responsive">
                <table class="table table-hover align-middle" style="font-size: 0.85rem;">
                    <thead><tr><th>Nombre / Web User</th><th>UID / PIN Físico</th><th class="text-end">Acciones</th></tr></thead>
                    <tbody id="tabla-usuarios-body"></tbody>
                </table>
            </div>
        </div>

        <div class="row g-2 mt-2">
            <div class="col-6"><button onclick="enviarComando('emergencia')" class="btn btn-danger w-100 py-3 rounded-4 fw-bold">🚨 PÁNICO</button></div>
            <div class="col-6"><button onclick="enviarComando('reset')" class="btn btn-light border w-100 py-3 rounded-4">🔄 RESET</button></div>
        </div>
    </div>

    <!-- PANEL USUARIO -->
    <div id="user-view" class="app-content container">
        <div class="card mx-auto mt-5 p-4 text-center" style="max-width: 400px; border-radius: 30px;">
            <div class="mb-4">
                <h3 id="perfil-nombre" class="fw-bold m-0 text-primary">Hola</h3>
                <span class="badge bg-light text-primary rounded-pill px-3">Residente</span>
            </div>
            
            <div class="bg-light p-3 rounded-4 mb-4">
                <p class="text-muted small mb-1 text-uppercase fw-bold">Tu PIN de Acceso Físico</p>
                <div id="perfil-pin" class="pin-box">****</div>
                <small class="text-muted">Usa este código en el teclado de la puerta</small>
            </div>

            <div class="text-start small border-top pt-3">
                <p class="mb-1"><b>Tarjeta UID:</b> <span id="perfil-uid" class="text-muted">--</span></p>
                <p class="mb-1"><b>Última entrada:</b> <span id="perfil-acceso" class="text-success fw-bold">--</span></p>
            </div>

            <button onclick="logout()" class="btn btn-outline-secondary w-100 mt-4 rounded-3">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
