<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Control Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Roboto', sans-serif; }
        .container { max-width: 500px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card-title { color: #58a6ff; font-weight: bold; font-size: 1.1rem; }
        .form-label { font-size: 0.85rem; color: #8b949e; margin-bottom: 4px; }
        .form-control { background-color: #0d1117; border: 1px solid #30363d; color: white; border-radius: 8px; }
        .form-control:focus { background-color: #0d1117; border-color: #58a6ff; color: white; box-shadow: 0 0 0 2px rgba(88,166,255,0.3); }
        .log-container { max-height: 250px; overflow-y: auto; background: #010409; border-radius: 8px; padding: 10px; border: 1px solid #30363d; }
        .log-entry { border-left: 3px solid #238636; background: #161b22; padding: 8px; margin-bottom: 8px; border-radius: 0 6px 6px 0; font-size: 0.8rem; }
        .timestamp { color: #8b949e; font-size: 0.7rem; font-weight: bold; }
        .btn-primary { background-color: #238636; border: none; font-weight: bold; }
        .btn-panic { background-color: #da3633; color: white; border: none; font-weight: bold; }
        .table-dark { --bs-table-bg: #161b22; }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="text-center mb-4">
        <h3 class="fw-bold">🛡️ Security Dashboard</h3>
        <p class="text-muted small">Panel de Control IoT - Samuel</p>
    </header>

    <!-- MONITOR DE EVENTOS -->
    <div class="card p-3 mb-4">
        <div class="card-title mb-2">📋 Historial de Accesos</div>
        <div id="log-list" class="log-container">
            <div class="text-center text-muted py-4">Sincronizando historial...</div>
        </div>
    </div>

    <!-- REGISTRO / EDICIÓN -->
    <div class="card p-4 mb-4">
        <div class="card-title mb-3">👤 Registro de Usuario</div>
        
        <div class="mb-3">
            <label for="uid" class="form-label">ID de Tarjeta (UID)</label>
            <input type="text" id="uid" class="form-control" placeholder="Ej: 334FFE0F">
        </div>

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre Completo</label>
            <input type="text" id="nombre" class="form-control" placeholder="Ej: Samuel">
        </div>

        <div class="mb-4">
            <label for="pin" class="form-label">PIN de Seguridad (4 Dígitos)</label>
            <input type="password" id="pin" class="form-control" placeholder="****" maxlength="4" inputmode="numeric">
        </div>

        <button onclick="crearUsuario()" class="btn btn-primary w-100 py-2">🚀 Guardar en Firebase</button>
    </div>

    <!-- GESTIÓN DE USUARIOS -->
    <div class="card p-3 mb-4">
        <div class="card-title mb-3">⚙️ Usuarios Registrados</div>
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0" style="font-size: 0.8rem;">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>UID</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios-body">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- CONTROLES -->
    <div class="row g-2">
        <div class="col-6"><button onclick="enviarComando('emergencia')" class="btn btn-panic w-100 py-3">🚨 PÁNICO</button></div>
        <div class="col-6"><button onclick="enviarComando('reset')" class="btn btn-secondary w-100 py-3">🔄 RESET</button></div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
