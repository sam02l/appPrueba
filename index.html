<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Seguridad RFID</title>

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 2px solid #1e293b;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #020617;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
      color: #38bdf8;
    }

    #estado {
      font-size: 14px;
      background: #020617;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #1e293b;
      white-space: pre-wrap;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 10px;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    .btn {
      background: #38bdf8;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      color: #020617;
      margin-top: 10px;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  🔐 Sistema de Seguridad RFID
</header>

<div class="container">

  <!-- ESTADO -->
  <div class="card">
    <h2>Estado del Sistema</h2>
    <div id="estado">Cargando...</div>
  </div>

  <!-- EVENTOS -->
  <div class="card">
    <h2>Historial de Eventos</h2>
    <ul id="eventos"></ul>
    <button class="btn" onclick="crearEvento()">➕ Evento de prueba</button>
  </div>

</div>

<footer>
  Proyecto ESP32 + RFID + Firebase
</footer>

<!-- IMPORTANTE -->
<script type="module" src="app.js"></script>

</body>
</html>
